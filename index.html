<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SportVibe – Activities Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <div class="nav-brand">
      <span class="nav-logo">⚡</span>
      <span class="nav-title">SPORTVIBE</span>
    </div>
    <button class="btn-add" id="openModal">+ Add Activity</button>
  </nav>

  <!-- HERO -->
  <header class="hero">
    <div class="hero-content">
      <p class="hero-sub">Discover · Play · Eat · Repeat</p>
      <h1 class="hero-heading">YOUR WORLD<br>OF <span class="accent">ACTION</span></h1>
      <div class="search-wrap">
        <input type="text" id="searchInput" class="search-input" placeholder="Search activities, food, sports…" />
        <span class="search-icon">🔍</span>
      </div>
    </div>
    <div class="hero-tape">
      <span>SPORTS</span><span>·</span><span>FOOD</span><span>·</span>
      <span>RECREATION</span><span>·</span><span>FITNESS</span><span>·</span>
      <span>EVENTS</span><span>·</span><span>ADVENTURE</span><span>·</span>
    </div>
  </header>

  <!-- STATS -->
  <section class="stats-bar" id="statsBar">
    <div class="stat-item"><span class="stat-num" id="statTotal">–</span><span class="stat-label">Activities</span></div>
    <div class="stat-divider"></div>
    <div class="stat-item"><span class="stat-num" id="statRating">–</span><span class="stat-label">Avg Rating</span></div>
    <div class="stat-divider"></div>
    <div class="stat-item"><span class="stat-num" id="statSports">–</span><span class="stat-label">Sports</span></div>
    <div class="stat-divider"></div>
    <div class="stat-item"><span class="stat-num" id="statFood">–</span><span class="stat-label">Food Events</span></div>
  </section>

  <!-- FILTER TABS -->
  <section class="filter-section">
    <div class="filter-tabs" id="filterTabs">
      <button class="tab active" data-cat="All">All</button>
    </div>
  </section>

  <!-- CARDS GRID -->
  <main class="main">
    <div class="cards-grid" id="cardsGrid">
      <div class="loader">Loading activities…</div>
    </div>
  </main>

  <!-- MODAL – Add Activity -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <button class="modal-close" id="closeModal">✕</button>
      <h2 class="modal-title">Add New Activity</h2>

      <div class="form-group">
        <label>Activity Name *</label>
        <input type="text" id="f-name" placeholder="e.g. Sunday 5-a-side Football" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Category *</label>
          <select id="f-category">
            <option value="Sports">Sports</option>
            <option value="Food">Food</option>
            <option value="Recreation">Recreation</option>
            <option value="Fitness">Fitness</option>
          </select>
        </div>
        <div class="form-group">
          <label>Emoji Icon</label>
          <input type="text" id="f-emoji" placeholder="🏆" maxlength="2" />
        </div>
      </div>

      <div class="form-group">
        <label>Description *</label>
        <textarea id="f-desc" rows="3" placeholder="Tell us about this activity…"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Location *</label>
          <input type="text" id="f-location" placeholder="City / Venue" />
        </div>
        <div class="form-group">
          <label>Date *</label>
          <input type="date" id="f-date" />
        </div>
      </div>

      <div class="form-group">
        <label>Rating (1–5)</label>
        <input type="number" id="f-rating" min="1" max="5" step="0.1" value="4.0" />
      </div>

      <div class="form-group">
        <label>Tags (comma-separated)</label>
        <input type="text" id="f-tags" placeholder="football, outdoor, fun" />
      </div>

      <button class="btn-submit" id="submitActivity">Save Activity</button>
      <p class="form-msg" id="formMsg"></p>
    </div>
  </div>

  <footer class="footer">
    <p>SportVibe © 2026 · Built with Flask + MongoDB + Vanilla JS</p>
  </footer>

  <script src="/static/js/app.js"></script>
</body>
</html>
